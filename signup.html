<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | NexAI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <nav class="glass-nav">
        <div class="logo"><a href="index.html" style="color: white; text-decoration: none;">NexAI.</a></div>
        <ul class="nav-links">
            <li><a href="login.html">Log In</a></li>
        </ul>
    </nav>

    <main class="hero">
        <div class="glass-card auth-card">
            <h2>Create Account</h2>
            <p>Start building with next-generation AI today.</p>
            
            <form action="index.html" class="auth-form">
                <div class="input-group">
                    <input type="text" id="name" placeholder=" " required>
                    <label for="name">Full Name</label>
                </div>

                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">Email Address</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder=" " required>
                    <label for="password">Create Password</label>
                </div>

                <button type="submit" class="btn-primary w-100">Create Account</button>
            </form>
            
            <p class="auth-footer">Already have an account? <a href="login.html">Log in</a></p>
        </div>
    </main>

</body>
</html>
