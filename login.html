<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NexAI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <nav class="glass-nav">
        <div class="logo"><a href="index.html" style="color: white; text-decoration: none;">NexAI.</a></div>
        <ul class="nav-links">
            <li><a href="signup.html" class="nav-btn">Sign Up</a></li>
        </ul>
    </nav>

    <main class="hero">
        <div class="glass-card auth-card">
            <h2>Welcome Back</h2>
            <p>Log in to access your intelligent dashboard.</p>
            
            <form action="index.html" class="auth-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">Email Address</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder=" " required>
                    <label for="password">Password</label>
                </div>

                <button type="submit" class="btn-primary w-100">Log In</button>
            </form>
            
            <p class="auth-footer">Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </main>

</body>
</html>
